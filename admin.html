<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel</title>
  <script src="config.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      background:#050505;
      color:#fff;
    }
    .wrap{
      width:min(1100px, calc(100% - 24px));
      margin:30px auto;
    }
    .card{
      background:#0d0f14;
      border:1px solid #1f2430;
      border-radius:24px;
      padding:24px;
      margin-bottom:20px;
    }
    h1,h2,h3{margin-top:0}
    .muted,.status,.small{color:#9aa0aa}
    label{
      display:block;
      margin-bottom:14px;
      font-weight:600;
    }
    input,textarea,select{
      width:100%;
      margin-top:8px;
      padding:14px 16px;
      border-radius:14px;
      border:1px solid #262c38;
      background:#090b0f;
      color:#fff;
      outline:none;
    }
    textarea{min-height:110px;resize:vertical}
    .grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }
    button{
      border:none;
      background:#fff;
      color:#111;
      padding:14px 20px;
      border-radius:999px;
      font-weight:700;
      cursor:pointer;
    }
    .btn-dark{
      background:#171b24;
      color:#fff;
      border:1px solid #293041;
    }
    .hidden{display:none}
    .preview{
      margin-top:12px;
      max-width:180px;
      border-radius:16px;
      border:1px solid #252b35;
      display:block;
    }
    .row-card{
      background:#0a0c10;
      border:1px solid #1f2430;
      border-radius:18px;
      padding:16px;
      margin-bottom:14px;
    }
    .toolbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }
    @media (max-width:800px){
      .grid{grid-template-columns:1fr}
      .card{padding:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="toolbar">
        <div>
          <h1>Admin Panel</h1>
          <p class="muted">Edit links, profile image, projects, and gallery online.</p>
        </div>
        <a href="index.html" style="color:#fff;text-decoration:none;">← Back to Site</a>
      </div>
    </div>

    <div class="card" id="loginCard">
      <h2>Login</h2>
      <label>
        Password
        <input type="password" id="password" placeholder="Enter password">
      </label>
      <button onclick="login()">Login</button>
      <div class="status" id="loginStatus"></div>
    </div>

    <div id="panel" class="hidden">
      <div class="card">
        <h2>Main Settings</h2>
        <div class="grid">
          <label>
            Hero Top Name
            <input id="heroTop" type="text" value="Ahmed">
          </label>

          <label>
            Hero Bottom Name
            <input id="heroBottom" type="text" value="Saad">
          </label>

          <label>
            Font Family
            <select id="fontFamily">
              <option value="'Inter', system-ui, sans-serif">Inter</option>
              <option value="'Cairo', sans-serif">Cairo</option>
            </select>
          </label>
        </div>
      </div>

      <div class="card">
        <h2>Profile Image</h2>
        <label>
          Image URL
          <input id="profileImageUrl" type="text" placeholder="Uploaded image URL will appear here">
        </label>
        <label>
          Upload Image From Your Device
          <input id="profileUpload" type="file" accept="image/*">
        </label>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button type="button" onclick="uploadProfileImage()">Upload Image</button>
        </div>
        <img id="previewImg" class="preview" alt="Preview">
        <div class="status" id="uploadStatus"></div>
      </div>

      <div class="card">
        <h2>Social Links</h2>
        <div id="socialLinksAdminList"></div>
        <button type="button" class="btn-dark" onclick="addSocialRow()">+ Add New Link</button>
      </div>

      <div class="card">
        <div class="toolbar">
          <h2>Projects</h2>
          <button type="button" class="btn-dark" onclick="addProjectRow()">+ Add Project</button>
        </div>
        <div id="projectsAdminList"></div>
      </div>

      <div class="card">
        <div class="toolbar">
          <h2>Gallery</h2>
          <button type="button" class="btn-dark" onclick="addGalleryRow()">+ Add Image</button>
        </div>
        <div id="galleryAdminList"></div>
      </div>

      <div class="card">
        <h2>Save Everything</h2>
        <button onclick="saveEverything()">Save Online</button>
        <div class="status" id="saveStatus"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const ADMIN_PASSWORD = "22446688";
    let socialLinksData = [];
    let projectsData = [];
    let galleryData = [];

    function login() {
      const password = document.getElementById("password").value;
      const loginStatus = document.getElementById("loginStatus");

      if (password !== ADMIN_PASSWORD) {
        loginStatus.textContent = "Wrong password";
        return;
      }

      document.getElementById("loginCard").classList.add("hidden");
      document.getElementById("panel").classList.remove("hidden");
      loginStatus.textContent = "";
      loadAllData();
    }

    function getClient() {
      if (!window.SITE_CONFIG || !SITE_CONFIG.supabaseUrl || !SITE_CONFIG.supabaseAnonKey) {
        alert("Please add your Supabase data first in config.js");
        return null;
      }
      return window.supabase.createClient(SITE_CONFIG.supabaseUrl, SITE_CONFIG.supabaseAnonKey);
    }

    async function uploadToImagesBucket(file) {
      const client = getClient();
      if (!client) return null;

      const fileName = Date.now() + "-" + file.name.replace(/\s+/g, "-");
      const { error } = await client.storage.from("images").upload(fileName, file);

      if (error) {
        alert(error.message);
        return null;
      }

      const { data } = client.storage.from("images").getPublicUrl(fileName);
      return data.publicUrl;
    }

    async function uploadProfileImage() {
      const file = document.getElementById("profileUpload").files[0];
      if (!file) return;
      document.getElementById("uploadStatus").textContent = "Uploading...";
      const url = await uploadToImagesBucket(file);
      if (url) {
        document.getElementById("profileImageUrl").value = url;
        document.getElementById("previewImg").src = url;
        document.getElementById("uploadStatus").textContent = "Image uploaded successfully";
      }
    }

    function socialRowTemplate(item = {}) {
      return `
        <div class="row-card">
          <div class="grid">
            <label>
              Platform
              <select class="social-platform">
                <option value="instagram" ${item.platform === 'instagram' ? 'selected' : ''}>Instagram</option>
                <option value="facebook" ${item.platform === 'facebook' ? 'selected' : ''}>Facebook</option>
                <option value="x" ${item.platform === 'x' ? 'selected' : ''}>X / Twitter</option>
                <option value="tiktok" ${item.platform === 'tiktok' ? 'selected' : ''}>TikTok</option>
                <option value="linktree" ${item.platform === 'linktree' ? 'selected' : ''}>Linktree</option>
                <option value="threads" ${item.platform === 'threads' ? 'selected' : ''}>Threads</option>
                <option value="linkedin" ${item.platform === 'linkedin' ? 'selected' : ''}>LinkedIn</option>
                <option value="shutterstock" ${item.platform === 'shutterstock' ? 'selected' : ''}>Shutterstock</option>
                <option value="github" ${item.platform === 'github' ? 'selected' : ''}>GitHub</option>
              </select>
            </label>
            <label>
              Label
              <input class="social-label" type="text" value="${item.label || ''}">
            </label>
            <label style="grid-column:1/-1;">
              URL
              <input class="social-url" type="text" value="${item.url || ''}">
            </label>
            <label>
              Sort Order
              <input class="social-order" type="number" value="${item.sort_order ?? 0}">
            </label>
            <label>
              Enabled
              <select class="social-enabled">
                <option value="true" ${(item.enabled ?? true) ? 'selected' : ''}>Yes</option>
                <option value="false" ${item.enabled === false ? 'selected' : ''}>No</option>
              </select>
            </label>
          </div>
        </div>
      `;
    }

    function projectRowTemplate(item = {}) {
      return `
        <div class="row-card">
          <div class="grid">
            <label>
              Title
              <input class="project-title" type="text" value="${item.title || ''}">
            </label>
            <label>
              Badge
              <input class="project-badge" type="text" value="${item.badge || 'PROJECT'}">
            </label>
            <label style="grid-column:1/-1;">
              Description
              <textarea class="project-description">${item.description || ''}</textarea>
            </label>
            <label style="grid-column:1/-1;">
              Hover Text
              <textarea class="project-hover">${item.hover_text || ''}</textarea>
            </label>
            <label style="grid-column:1/-1;">
              Image URL
              <input class="project-image-url" type="text" value="${item.image_url || ''}">
            </label>
            <label>
              Upload Image
              <input class="project-image-file" type="file" accept="image/*">
            </label>
            <label>
              Sort Order
              <input class="project-order" type="number" value="${item.sort_order ?? 0}">
            </label>
            <label>
              Featured on Home
              <select class="project-featured">
                <option value="true" ${(item.featured ?? true) ? 'selected' : ''}>Yes</option>
                <option value="false" ${item.featured === false ? 'selected' : ''}>No</option>
              </select>
            </label>
            <label>
              Enabled
              <select class="project-enabled">
                <option value="true" ${(item.enabled ?? true) ? 'selected' : ''}>Yes</option>
                <option value="false" ${item.enabled === false ? 'selected' : ''}>No</option>
              </select>
            </label>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
            <button type="button" class="btn-dark" onclick="uploadProjectImage(this)">Upload Project Image</button>
            <button type="button" class="btn-dark" onclick="removeRow(this)">Delete Row</button>
          </div>
        </div>
      `;
    }

    function galleryRowTemplate(item = {}) {
      return `
        <div class="row-card">
          <div class="grid">
            <label>
              Title
              <input class="gallery-title" type="text" value="${item.title || ''}">
            </label>
            <label>
              Sort Order
              <input class="gallery-order" type="number" value="${item.sort_order ?? 0}">
            </label>
            <label style="grid-column:1/-1;">
              Hover Text
              <textarea class="gallery-hover">${item.hover_text || ''}</textarea>
            </label>
            <label style="grid-column:1/-1;">
              Image URL
              <input class="gallery-image-url" type="text" value="${item.image_url || ''}">
            </label>
            <label>
              Upload Image
              <input class="gallery-image-file" type="file" accept="image/*">
            </label>
            <label>
              Featured on Home
              <select class="gallery-featured">
                <option value="true" ${(item.featured ?? true) ? 'selected' : ''}>Yes</option>
                <option value="false" ${item.featured === false ? 'selected' : ''}>No</option>
              </select>
            </label>
            <label>
              Enabled
              <select class="gallery-enabled">
                <option value="true" ${(item.enabled ?? true) ? 'selected' : ''}>Yes</option>
                <option value="false" ${item.enabled === false ? 'selected' : ''}>No</option>
              </select>
            </label>
          </div>
          <div style="margin-top:12px;display:flex;gap:10px;flex-wrap:wrap;">
            <button type="button" class="btn-dark" onclick="uploadGalleryImage(this)">Upload Gallery Image</button>
            <button type="button" class="btn-dark" onclick="removeRow(this)">Delete Row</button>
          </div>
        </div>
      `;
    }

    function removeRow(button) {
      const row = button.closest(".row-card");
      if (row) row.remove();
    }

    function renderLists() {
      document.getElementById("socialLinksAdminList").innerHTML = socialLinksData.map(socialRowTemplate).join("");
      document.getElementById("projectsAdminList").innerHTML = projectsData.map(projectRowTemplate).join("");
      document.getElementById("galleryAdminList").innerHTML = galleryData.map(galleryRowTemplate).join("");
    }

    function addSocialRow() {
      socialLinksData.push({ platform:"instagram", label:"", url:"", sort_order:socialLinksData.length+1, enabled:true });
      renderLists();
    }

    function addProjectRow() {
      projectsData.push({ title:"", description:"", image_url:"", badge:"PROJECT", hover_text:"", sort_order:projectsData.length+1, featured:true, enabled:true });
      renderLists();
    }

    function addGalleryRow() {
      galleryData.push({ title:"", image_url:"", hover_text:"", sort_order:galleryData.length+1, featured:true, enabled:true });
      renderLists();
    }

    async function uploadProjectImage(button) {
      const row = button.closest(".row-card");
      const file = row.querySelector(".project-image-file").files[0];
      if (!file) return;
      const url = await uploadToImagesBucket(file);
      if (url) row.querySelector(".project-image-url").value = url;
    }

    async function uploadGalleryImage(button) {
      const row = button.closest(".row-card");
      const file = row.querySelector(".gallery-image-file").files[0];
      if (!file) return;
      const url = await uploadToImagesBucket(file);
      if (url) row.querySelector(".gallery-image-url").value = url;
    }

    function collectSocialRows() {
      return [...document.querySelectorAll("#socialLinksAdminList .row-card")].map(row => ({
        platform: row.querySelector(".social-platform").value,
        label: row.querySelector(".social-label").value.trim(),
        url: row.querySelector(".social-url").value.trim(),
        sort_order: parseInt(row.querySelector(".social-order").value || "0", 10),
        enabled: row.querySelector(".social-enabled").value === "true"
      })).filter(item => item.label && item.url);
    }

    function collectProjectRows() {
      return [...document.querySelectorAll("#projectsAdminList .row-card")].map(row => ({
        title: row.querySelector(".project-title").value.trim(),
        description: row.querySelector(".project-description").value.trim(),
        image_url: row.querySelector(".project-image-url").value.trim(),
        badge: row.querySelector(".project-badge").value.trim(),
        hover_text: row.querySelector(".project-hover").value.trim(),
        sort_order: parseInt(row.querySelector(".project-order").value || "0", 10),
        featured: row.querySelector(".project-featured").value === "true",
        enabled: row.querySelector(".project-enabled").value === "true"
      })).filter(item => item.title && item.image_url);
    }

    function collectGalleryRows() {
      return [...document.querySelectorAll("#galleryAdminList .row-card")].map(row => ({
        title: row.querySelector(".gallery-title").value.trim(),
        image_url: row.querySelector(".gallery-image-url").value.trim(),
        hover_text: row.querySelector(".gallery-hover").value.trim(),
        sort_order: parseInt(row.querySelector(".gallery-order").value || "0", 10),
        featured: row.querySelector(".gallery-featured").value === "true",
        enabled: row.querySelector(".gallery-enabled").value === "true"
      })).filter(item => item.title && item.image_url);
    }

    async function loadAllData() {
      const client = getClient();
      if (!client) return;

      const { data: settings } = await client.from("site_settings").select("*").eq("id", 1).single();
      if (settings) {
        document.getElementById("heroTop").value = settings.hero_name_top || "Ahmed";
        document.getElementById("heroBottom").value = settings.hero_name_bottom || "Saad";
        document.getElementById("fontFamily").value = settings.font_family || "'Inter', system-ui, sans-serif";
        document.getElementById("profileImageUrl").value = settings.profile_image_url || "";
        if (settings.profile_image_url) document.getElementById("previewImg").src = settings.profile_image_url;
      }

      const { data: links } = await client.from("social_links").select("*").order("sort_order", { ascending:true });
      const { data: projects } = await client.from("projects").select("*").order("sort_order", { ascending:true });
      const { data: gallery } = await client.from("gallery_items").select("*").order("sort_order", { ascending:true });

      socialLinksData = links || [];
      projectsData = projects || [];
      galleryData = gallery || [];

      renderLists();
    }

    async function saveEverything() {
      const client = getClient();
      if (!client) return;
      const saveStatus = document.getElementById("saveStatus");
      saveStatus.textContent = "Saving...";

      const settingsPayload = {
        id: 1,
        hero_name_top: document.getElementById("heroTop").value,
        hero_name_bottom: document.getElementById("heroBottom").value,
        font_family: document.getElementById("fontFamily").value,
        profile_image_url: document.getElementById("profileImageUrl").value
      };

      let result = await client.from("site_settings").upsert(settingsPayload);
      if (result.error) {
        saveStatus.textContent = result.error.message;
        return;
      }

      await client.from("social_links").delete().gt("id", 0);
      const socialRows = collectSocialRows();
      if (socialRows.length) {
        result = await client.from("social_links").insert(socialRows);
        if (result.error) {
          saveStatus.textContent = result.error.message;
          return;
        }
      }

      await client.from("projects").delete().gt("id", 0);
      const projectRows = collectProjectRows();
      if (projectRows.length) {
        result = await client.from("projects").insert(projectRows);
        if (result.error) {
          saveStatus.textContent = result.error.message;
          return;
        }
      }

      await client.from("gallery_items").delete().gt("id", 0);
      const galleryRows = collectGalleryRows();
      if (galleryRows.length) {
        result = await client.from("gallery_items").insert(galleryRows);
        if (result.error) {
          saveStatus.textContent = result.error.message;
          return;
        }
      }

      saveStatus.textContent = "Saved online successfully";
      await loadAllData();
    }
  </script>
</body>
</html>
