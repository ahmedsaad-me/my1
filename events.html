<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Events</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="config.js"></script>

<style>

.events-container{
max-width:1200px;
margin:auto;
padding:80px 20px;
}

.events-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.event-card{
background:#111;
border-radius:12px;
overflow:hidden;
transition:0.3s;
}

.event-card:hover{
transform:translateY(-5px);
}

.event-cover{
width:100%;
height:200px;
object-fit:cover;
}

.event-body{
padding:18px;
}

.event-title{
font-size:20px;
margin-bottom:8px;
}

.event-meta{
font-size:13px;
opacity:.7;
margin-bottom:10px;
}

.event-desc{
font-size:14px;
line-height:1.6;
margin-bottom:15px;
}

.event-btn{
display:inline-block;
padding:8px 16px;
border-radius:6px;
background:#fff;
color:#000;
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="events-container">

<h1 style="margin-bottom:40px">Events</h1>

<div class="events-grid" id="eventsGrid"></div>

</div>


<script>

const client = supabase.createClient(
SITE_CONFIG.supabaseUrl,
SITE_CONFIG.supabaseAnonKey
)

async function loadEvents(){

const { data, error } = await client
.from("events")
.select("*")
.eq("enabled",true)
.order("sort_order",{ascending:true})

if(error){
console.error(error)
return
}

renderEvents(data)

}

function renderEvents(events){

const grid = document.getElementById("eventsGrid")

grid.innerHTML=""

events.forEach(event=>{

grid.innerHTML+=`

<div class="event-card">

<img class="event-cover" src="${event.cover_image_url}" />

<div class="event-body">

<div class="event-title">
${event.title}
</div>

<div class="event-meta">
${event.event_date || ""} • ${event.location || ""}
</div>

<div class="event-desc">
${event.excerpt || ""}
</div>

<a class="event-btn" href="event.html?slug=${event.slug}">
View Event
</a>

</div>

</div>

`

})

}

loadEvents()

</script>

</body>
</html>
